<div class="login-wrapper">
<div class="bg-image"></div>
<div class="bg-overlay"></div>
<div class="login-container">
<div class="login-card">
<div class="login-header">
<div class="brand-logo"></div>
<h1 class="login-title">Welcome !!</h1>
<p class="login-subtitle">Login to continue</p>
</div>
<form [formGroup]="loginForm" (ngSubmit)="login()">
<!-- Email -->
<div class="form-group">
<label>Email</label>
<input
           type="email"
           formControlName="email"
           placeholder="Enter your email"
         />
<div class="error" *ngIf="email.invalid && email.touched">
<span *ngIf="email.errors?.['required']">Email is required</span>
<span *ngIf="email.errors?.['email']">Enter a valid email</span>
</div>
</div>
<!-- Password -->
<div class="form-group">
<label>Password</label>
<input
           type="password"
           formControlName="password"
           placeholder="Enter your password"
         />
<div class="error" *ngIf="password.invalid && password.touched">
<span *ngIf="password.errors?.['required']">Password is required</span>
<span *ngIf="password.errors?.['minlength']">Minimum 6 characters required</span>
</div>
</div>
<!-- Backend error — shows ONLY when form is valid but credentials are wrong -->
<div class="error" *ngIf="errorMessage && loginForm.valid">
         {{ errorMessage }}
</div>
<!-- Submit -->
<button
         type="submit"
         class="login-btn"
         [disabled]="isLoading"
>
<span *ngIf="!isLoading">Login</span>
<span *ngIf="isLoading">Logging in...</span>
</button>
</form>
</div>
</div>
</div>
