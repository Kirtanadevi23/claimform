<div class="header-container">
  <div class="app-title">
    <strong>Reimbursement App</strong>
  </div>


  <clr-dropdown >

    <button class="username" class="btn btn-link btn-sm" clrDropdownTrigger>
      Welcome, {{ username }}
      <cds-icon shape="angle" direction="down"></cds-icon>
    </button>

    <clr-dropdown-menu clrPosition="bottom-right" *clrIfOpen>
      <button clrDropdownItem (click)="logout()">Logout</button>
    </clr-dropdown-menu>
  </clr-dropdown>
