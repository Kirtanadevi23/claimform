<div>
  <img src="/assets/wind1.jpg" alt="Background" class="image clr-p-4">
  <div class="page">
    <h2 class="title">Expense Reimbursement</h2>
    <!-- personal details -->
    <div class="info-card">
      <div class="info-card-header">
        <h3>Personal Details</h3>
      </div>
      <div class="info-card-body">
        <div class="clr-row clr-form clr-form-horizontal">
          <!-- Row 1 -->
          <div class="clr-col-4">
            <clr-input-container>
              <label><strong>Employee Name :</strong></label>
              <input clrInput type="text" [value]="personalData.username" readonly />
            </clr-input-container>
          </div>
          <div class="clr-col-4">
            <clr-input-container>
              <label><strong>Employee Code : </strong></label>
              <input clrInput type="text" [value]="personalData.employeeCode" readonly />
            </clr-input-container>
          </div>
          <div class="clr-col-4">
            <clr-input-container>
              <label><strong>Cost Center : </strong></label>
              <input clrInput type="text" [value]="personalData.costCenter" readonly />
            </clr-input-container>
          </div>

          <!-- Row 2 -->
          <div class="clr-col-4">
            <clr-input-container>
              <label><strong>Company & Plant : </strong></label>
              <input clrInput type="text" [value]="personalData.companyPlant" readonly />
            </clr-input-container>
          </div>
          <div class="clr-col-4">
            <clr-input-container>
              <label><strong>Purpose & Place : </strong></label>
              <input clrInput type="text" [value]="personalData.purposePlace" readonly />
            </clr-input-container>
          </div>
          <div class="clr-col-4">
            <clr-input-container>
              <label><strong>Vendor Code : </strong></label>
              <input clrInput type="text" [value]="personalData.vendorCode" readonly />
            </clr-input-container>
          </div>
        </div>
      </div>
    </div>

    <!-- Add Expense Button -->
    <button class="btn btn-primary clr-mb-3" (click)="openModal()">Add Expense</button>


    <!-- Expense Form Modal -->
    <clr-modal [(clrModalOpen)]="showModal" [clrModalSize]="'md'">
      <h3 class="modal-title">Expense Details</h3>
      <div class="modal-body">
        <form #expenseForm="ngForm" (ngSubmit)="addExpense(expenseForm)" clrForm>
          <clr-input-container class="mandatory">
            <label class="clr-col-12 clr-col-md-4">Date</label>
            <input class="clr-col-12 clr-col-md-8" clrInput type="date" name="date" [max]="today" ngModel required />
          </clr-input-container>

          <clr-input-container class="mandatory">
            <label class="clr-col-12 clr-col-md-4">Supporting No</label>
            <input class="clr-col-12 clr-col-md-8" clrInput type="text" name="supportNo" placeholder="e.g., 123456"
              ngModel required />
          </clr-input-container>

          <clr-select-container class="mandatory">
            <label class="clr-col-12 clr-col-md-4">Particulars</label>
            <select class="clr-col-12 clr-col-md-8" clrSelect name="particular" ngModel required>
              <option value="" disabled selected>Select</option>
              <option>Hotel</option>
              <option>Transport</option>
              <option>Food</option>
              <option>Allowance</option>
              <option>Communication</option>
              <option>Visa Process Fees</option>
              <option>Repairs & Maintenance</option>
              <option>Others</option>
            </select>
          </clr-select-container>

          <clr-select-container class="mandatory">
            <label class="clr-col-12 clr-col-md-4">Payment Mode</label>
            <select class="clr-col-12 clr-col-md-8" clrSelect name="mode" ngModel required>
              <option value="" disabled selected>Select payment mode</option>
              <option value="Cash">Cash</option>
              <option value="Card">Card</option>
              <option value="Itilite">Itilite</option>
            </select>
          </clr-select-container>

          <clr-input-container class="mandatory">
            <label class="clr-col-12 clr-col-md-4">Amount</label>
            <input class="clr-col-12 clr-col-md-8" clrInput type="number" name="amount" placeholder="0.00" ngModel
              required />
          </clr-input-container>

          <clr-textarea-container [ngClass]="{'mandatory': expenseForm.value.particular === 'Others'}">
            <label class="clr-col-12 clr-col-md-4">Remarks

              <!-- <span *ngIf="expenseForm.value.particular === 'Others'" class="mandatory">*</span> -->

            </label>
            <textarea class="clr-col-12 clr-col-md-8" clrTextarea name="remarks" placeholder="e.g., Test entry" rows="2"
              ngModel [required]="expenseForm.value.particular === 'Others'">
  </textarea>
          </clr-textarea-container>
          <clr-input-container>
            <label class="clr-col-12 clr-col-md-4">Screenshot</label>
            <input class="clr-col-12 clr-col-md-8" clrInput type="file" (change)="onFileChange($event)"
              accept="image/*" />
            <!-- <img *ngIf="preview" [src]="preview" class="preview" /> -->
            <p *ngIf="fileName" class="clr-col-12 clr-col-md-8">Selected file: {{ fileName }}</p>
          </clr-input-container>

          <div class="modal-actions">
            <button type="reset" class="btn btn-outline">Reset</button>
            <button type="submit" class="btn btn-primary" [disabled]="!expenseForm.valid">Add</button>

          </div>
        </form>
      </div>
    </clr-modal>

    <!-- Expense Table -->
    <clr-datagrid>
      <clr-dg-column>Date</clr-dg-column>
      <clr-dg-column>Supporting No</clr-dg-column>
      <clr-dg-column>Particular</clr-dg-column>
      <clr-dg-column>Payment Mode</clr-dg-column>
      <clr-dg-column>Amount</clr-dg-column>
      <clr-dg-column>Remarks</clr-dg-column>
      <clr-dg-column>Screenshot</clr-dg-column>

      <clr-dg-row *ngFor="let e of expenses">
        <clr-dg-cell>{{ e.date }}</clr-dg-cell>
        <clr-dg-cell>{{ e.supportNo }}</clr-dg-cell>
        <clr-dg-cell>{{ e.particular }}</clr-dg-cell>
        <clr-dg-cell>{{ e.mode }}</clr-dg-cell>
        <clr-dg-cell>₹{{ e.amount }}</clr-dg-cell>
        <clr-dg-cell>{{ e.remarks }}</clr-dg-cell>

        <clr-dg-cell>
          <a href="javascript:void{{ e.filename }}">{{ e.filename }}</a>
        </clr-dg-cell>
      </clr-dg-row>
      <clr-dg-placeholder *ngIf="expenses.length === 0">No expense added yet!</clr-dg-placeholder>
    </clr-datagrid>

  </div>
  <div class="modal-footer">
    <button class="btn btn-outline" (click)="closeImageModal()">Close</button>
  </div>

    <div class="bottom-btns">
       <div class="backbtn" >

        <button class="btn btn-primary" (click)="goBack()">
          ← Back
        </button>
      </div>
      <button class="btn btn-outline" (click)="cancel()">Cancel</button>
      <button class="btn btn-primary" [disabled]="expenses.length < 1" (click)="review()">Review</button>

     

    </div>
  </div>
</div>
