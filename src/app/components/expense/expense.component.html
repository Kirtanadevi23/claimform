<div>
  <img src="/assets/wind1.jpg" class="image clr-p-4">
  <div class="page">
    <h2 class="title">Expense Reimbursement</h2>
    <!-- PERSONAL DETAILS -->
    <div class="info-card">
      <h3>Personal Details</h3>
      <div class="clr-row clr-form clr-form-horizontal">
        <div class="clr-col-4">
          <label>Employee Name</label>
          <input clrInput type="text" [value]="personalData?.name" readonly />
        </div>
        <div class="clr-col-4">
          <label>Employee Code</label>
          <input clrInput type="text" [value]="personalData?.employeeCode" readonly />
        </div>
        <div class="clr-col-4">
          <label>Cost Center</label>
          <input clrInput type="text" [value]="personalData?.costCenter" readonly />
        </div>
        <div class="clr-col-4">
          <label>Company & Plant</label>
          <input clrInput type="text" [value]="personalData?.companyPlant" readonly />
        </div>
        <div class="clr-col-4">
          <label>Purpose & Place</label>
          <input clrInput type="text" [value]="personalData?.purposePlace" readonly />
        </div>
        <div class="clr-col-4">
          <label>Vendor Code</label>
          <input clrInput type="text" [value]="personalData?.vendorCode" readonly />
        </div>
      </div>
    </div>
    <!-- ADD BUTTON -->
    <button class="btn btn-primary clr-mb-3" (click)="openModal()">Add Expense</button>
    <!-- MODAL -->
    <clr-modal [(clrModalOpen)]="showModal">
      <h3 class="modal-title">Expense Details</h3>
      <div class="modal-body">
        <form #expenseForm="ngForm" (ngSubmit)="addExpense(expenseForm)">
          <label>Date</label>
          <input clrInput type="date" name="date" [max]="today" ngModel required />
          <label>Supporting No</label>
          <input clrInput type="text" name="supportNo" ngModel required />
          <label>Particular</label>
          <select clrSelect name="particular" ngModel required>
            <option>Hotel</option>
            <option>Transport</option>
            <option>Food</option>
            <option>Others</option>
          </select>
          <label>Payment Mode</label>
          <select clrSelect name="mode" ngModel required>
            <option>Cash</option>
            <option>Card</option>
          </select>
          <label>Amount</label>
          <input clrInput type="number" name="amount" ngModel required />
          <label>Remarks</label>
          <input clrInput type="text" name="remarks" ngModel />
          <label>Screenshot</label>
          <input type="file" (change)="onFileChange($event)" />
          <div class="modal-footer">
            <button type="reset" class="btn btn-outline">Reset</button>
            <button type="submit" class="btn btn-primary">Add</button>
          </div>
        </form>
      </div>
    </clr-modal>
    <!-- TABLE -->
    <clr-datagrid>
      <clr-dg-column>Date</clr-dg-column>
      <clr-dg-column>Support No</clr-dg-column>
      <clr-dg-column>Particular</clr-dg-column>
      <clr-dg-column>Mode</clr-dg-column>
      <clr-dg-column>Amount</clr-dg-column>
      <clr-dg-row *ngFor="let e of expenses">
        <clr-dg-cell>{{ e.date }}</clr-dg-cell>
        <clr-dg-cell>{{ e.supportNo }}</clr-dg-cell>
        <clr-dg-cell>{{ e.particular }}</clr-dg-cell>
        <clr-dg-cell>{{ e.mode }}</clr-dg-cell>
        <clr-dg-cell>₹{{ e.amount }}</clr-dg-cell>
      </clr-dg-row>
      <clr-dg-placeholder *ngIf="expenses.length === 0">
        No expense added yet!
      </clr-dg-placeholder>
    </clr-datagrid>
    <!-- BUTTONS -->
    <div class="bottom-btns">
      <button class="btn btn-primary" (click)="goBack()">← Back</button>
      <button class="btn btn-outline" (click)="cancel()">Cancel</button>
      <button class="btn btn-primary" [disabled]="expenses.length < 1" (click)="review()">Review</button>
    </div>
  </div>
</div>
